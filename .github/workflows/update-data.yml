name: Uppdatera matchdata

on:
  schedule:
    - cron: '*/5 * * * *'    # var 5:e minut (GitHub Actions minimum)
  workflow_dispatch:           # manuell knapp i GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Hämta matchdata
        run: node generate-data.js

      - name: Committa om data ändrats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jsons/data.js
          git diff --staged --quiet || (git commit -m "chore: uppdatera matchdata" && git push)
